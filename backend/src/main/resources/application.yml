spring:
  application:
    name: ict-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ict_platform}
    username: ${DB_USERNAME:ict_user}
    password: ${DB_PASSWORD:ict_password}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

zoho:
  crm:
    client-id: ${ZOHO_CRM_CLIENT_ID:}
    client-secret: ${ZOHO_CRM_CLIENT_SECRET:}
    refresh-token: ${ZOHO_CRM_REFRESH_TOKEN:}
    base-url: ${ZOHO_CRM_BASE_URL:https://www.zohoapis.com/crm/v2}
    auth-url: ${ZOHO_AUTH_URL:https://accounts.zoho.com/oauth/v2/token}
  books:
    organization-id: ${ZOHO_BOOKS_ORG_ID:}
    base-url: ${ZOHO_BOOKS_BASE_URL:https://www.zohoapis.com/books/v3}
  people:
    base-url: ${ZOHO_PEOPLE_BASE_URL:https://people.zoho.com/api}
  desk:
    org-id: ${ZOHO_DESK_ORG_ID:}
    base-url: ${ZOHO_DESK_BASE_URL:https://desk.zoho.com/api/v1}
  fsm:
    base-url: ${ZOHO_FSM_BASE_URL:https://fsm.zoho.com/fsm/v1}
  rate-limit:
    requests-per-minute: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.ict.platform: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ict-platform.log
    max-size: 10MB
    max-history: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600
