version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ict-platform-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ict_platform
      - DB_USERNAME=ict_user
      - DB_PASSWORD=ict_password
      - DB_DRIVER=org.postgresql.Driver
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - JWT_SECRET=${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      - JWT_EXPIRATION=86400000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - ZOHO_CRM_CLIENT_ID=${ZOHO_CRM_CLIENT_ID:-}
      - ZOHO_CRM_CLIENT_SECRET=${ZOHO_CRM_CLIENT_SECRET:-}
      - ZOHO_CRM_REFRESH_TOKEN=${ZOHO_CRM_REFRESH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: ict-platform-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ict_platform
      - POSTGRES_USER=ict_user
      - POSTGRES_PASSWORD=ict_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ict_user -d ict_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ict-platform-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@ict-platform.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - ict-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  ict-network:
    driver: bridge
